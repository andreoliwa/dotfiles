# http://duplicity.nongnu.org/vers8/duplicity.1.html

# Exclude files first
# keep-sorted start
# Cargo: binaries and registry are re-downloaded by cargo; hidden caches are build artifacts
- $HOME/.cargo/.global-cache
- $HOME/.cargo/.package-cache
- $HOME/.cargo/.package-cache-mutate
- $HOME/.cargo/bin/
- $HOME/.cargo/git/
- $HOME/.cargo/registry/
# GitHub Copilot: telemetry and cached completions, all regeneratable
- $HOME/.config/github-copilot/
# Raycast: extension bundles installed from the store, re-downloaded on launch
- $HOME/.config/raycast/extensions/node_modules/
# GNUPG Sockets and lock files
- $HOME/.gnupg/.#lk*
- $HOME/.gnupg/S.*
- $HOME/.gnupg/random_seed
# Logseq: plugins dir included - some plugins may be unavailable on the marketplace
- $HOME/.orbstack/
- $HOME/Library/Caches/
- $HOME/Library/Containers/
- $HOME/Library/Group Containers/
- $HOME/OrbStack/
- $HOME/container-apps/strapi/app/.cache/
- $HOME/container-apps/strapi/app/build/
# PocketBase: auxiliary.db is the full-text search index, regenerated automatically on startup
- $HOME/pb_data/auxiliary.db
# Grav CMS: vendor is PHP deps (composer install regenerates); backup/images/tmp are ephemeral
- $HOME/data/grav/www/backup/
- $HOME/data/grav/www/images/
- $HOME/data/grav/www/tmp/
- $HOME/data/grav/www/vendor/
# Immich: encoded-video is regeneratable; backups subdir already in OneDrive via ca immich dump
- $HOME/data/immich/library/backups/
- $HOME/data/immich/library/encoded-video/
- **/*.lock
- **/*.pyc
- **/*.sock
- **/*.socket
- **/*site/assets
- **/.DS_Store
- **/.Trash
- **/.bash_sessions/
- **/.cache/
- **/.claude/backups/
- **/.claude/file-history/
- **/.claude/ide/
- **/.claude/paste-cache/
# Claude plugins: binaries and marketplace downloads, re-installed on launch
- **/.claude/plugins/
- **/.claude/projects/
- **/.claude/session-env/
- **/.claude/sessions/
- **/.claude/shell-snapshots/
- **/.claude/tasks/
# Claude usage telemetry, not needed in backup
- **/.claude/usage-data/
- **/.claude/worktrees/
- **/.git
- **/.mypy_cache
# Git worktrees are ephemeral; all files should exist in the main branch
- **/.worktrees/
- **/.parcel-cache
- **/.recycle/
- **/.sass-cache
- **/.tox
- **/.venv
- **/_build/
- **/_site/
- **/cache/
- **/go/pkg
# Kube HTTP cache
- **/http-cache/
- **/logseq/bak/
- **/node_modules/
- **/public/assets
- **/shell/bin
# keep-sorted end

# Everything else
# keep-sorted start
$HOME/*.py
$HOME/*conjuring*.py
$HOME/*history*
$HOME/.aws/
$HOME/.bash_*
$HOME/.cargo/
$HOME/.config/
$HOME/.cookiecutterrc
$HOME/.gitconfig*
$HOME/.gnupg/
$HOME/.gradle/gradle.properties
$HOME/.jira.d/
$HOME/.kube/
$HOME/.logseq/
$HOME/.ssh/
$HOME/.tool-versions
# Chrome: only bookmarks, favicons and preferences per profile; everything else is regeneratable
$HOME/Library/Application Support/Google/Chrome/Default/Bookmarks
$HOME/Library/Application Support/Google/Chrome/Default/Favicons
$HOME/Library/Application Support/Google/Chrome/Default/Preferences
$HOME/Library/Application Support/Google/Chrome/Profile 1/Bookmarks
$HOME/Library/Application Support/Google/Chrome/Profile 1/Favicons
$HOME/Library/Application Support/Google/Chrome/Profile 1/Preferences
$HOME/Library/Application Support/Google/Chrome/Profile 2/Bookmarks
$HOME/Library/Application Support/Google/Chrome/Profile 2/Favicons
$HOME/Library/Application Support/Google/Chrome/Profile 2/Preferences
$HOME/Library/Application Support/Google/Chrome/Profile 3/Bookmarks
$HOME/Library/Application Support/Google/Chrome/Profile 3/Favicons
$HOME/Library/Application Support/Google/Chrome/Profile 3/Preferences
$HOME/Library/Application Support/Google/Chrome/Profile 4/Bookmarks
$HOME/Library/Application Support/Google/Chrome/Profile 4/Favicons
$HOME/Library/Application Support/Google/Chrome/Profile 4/Preferences
$HOME/Library/Application Support/JetBrains/PyCharm*/consoles/
$HOME/Library/Application Support/JetBrains/PyCharm*/scratches/
$HOME/Library/Application Support/daily-grind/
$HOME/Library/Application Support/dontforget/
$HOME/Monero/
$HOME/backup/
# PocketBase: pb_migrations can be committed to git; pb_data holds the live DB
$HOME/pb_data/
$HOME/pb_migrations/
$HOME/container-apps/strapi/app/
$HOME/data/
$HOME/dev/**/*conjuring*.py
$HOME/dev/**/*sandbox*
# My projects
$HOME/dev/**/.*env*
$HOME/dev/**/.idea/
$HOME/dev/**/.python-version
$HOME/dev/**/.tool-versions
# Wolt
$HOME/wolt-certificates/
**/.augment/
**/.claude/
**/AGENTS.md
**/CLAUDE.md
# keep-sorted end
