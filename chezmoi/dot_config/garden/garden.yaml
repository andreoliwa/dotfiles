---
# https://garden-rs.gitlab.io/configuration.html
garden:
  root: "${GARDEN_CONFIG_DIR}"
  includes:
    - private.yaml

commands:
  st:
    - git status --short
    - git branch
  status:
    - git status --short
    - git branch

templates:
  python-project:
    commands:
      ide: pycharm ${TREE_PATH}
  go-project:
    commands:
      ide: goland ${TREE_PATH}
  idea-project:
    commands:
      ide: idea ${TREE_PATH}
