[tools]
python = ["3.14", "3.13", "3.12", "3.11", "3.10", "3.9"]  # all for tox
node = "lts"
pnpm = "latest"
ruby = "latest"
java = "openjdk-17"
golangci-lint = "2.5.0"
# Using pipx backend (not vfox) because the vfox Poetry plugin is broken:
# it fails with a Lua runtime error during PostInstall.
# Bug: https://github.com/mise-plugins/vfox-poetry
# pipx backend installs Poetry in an isolated virtualenv (prevents dependency conflicts).
# Per-repo version pinning: add a mise.toml in the repo root with:
#   [tools]
#   "pipx:poetry" = "1.8.5"   # or whatever version that repo needs
# The global "latest" here is the fallback when no repo-level config exists.
"pipx:poetry" = "latest"

[env]
# Avoid locale errors in some Python modules
LC_ALL = "en_US.UTF-8"
LANG = "en_US.UTF-8"
# https://docs.python.org/3/using/cmdline.html#envvar-PYTHONBREAKPOINT
PYTHONBREAKPOINT = "pudb.set_trace"
# Echo all commands in all tasks by default (like 'make' does)
# http://docs.pyinvoke.org/en/stable/concepts/configuration.html#basic-rules
INVOKE_RUN_ECHO = "1"
# Use a pseudoterminal by default (display colored output)
# http://docs.pyinvoke.org/en/stable/api/runners.html#invoke.runners.Runner.run
INVOKE_RUN_PTY = "1"
# To fix this warning on macOS: "⚠️ Found a space in the pipx home path. We heavily discourage this, due to multiple incompatibilities.
# Please check our docs for more information on this, as well as some pointers on how to migrate to a different home path."
PIPX_HOME = "{{env.HOME}}/.local/pipx"
# Avoid fork() crash when macOS Objective-C runtime is used in subprocesses (e.g. flake8)
# https://stackoverflow.com/a/52230415
OBJC_DISABLE_INITIALIZE_FORK_SAFETY = "YES"
RIPGREP_CONFIG_PATH = "{{env.HOME}}/.ripgreprc"

[hooks]
enter = "invoke ai.plans"

[settings]
# Needed to use "hooks" above
experimental = true
