# -- general -------------------------------------------------------------------
set -g history-limit 10000
set -g mouse on
set -g status-position top
set -g visual-activity on

# Copy to OS clipboard (macOS)
set -g set-clipboard on

# -- prefix --------------------------------------------------------------------
# C-b is the default prefix. C-a is added as a second prefix (like screen).
# To send a literal C-a to the terminal, press C-a twice.
set -g prefix2 C-a
bind C-a send-prefix -2

# -- status bar ----------------------------------------------------------------
# Window list format: index + current directory name
# To show window name instead: replace #{b:pane_current_path} with #W
set -g window-status-format '#I #{b:pane_current_path}'
set -g window-status-current-format '#I #{b:pane_current_path}'

# Current window highlight: black text on light blue
# To change colors, use colour names (e.g. colour196) or hex (#ff0000)
set -g window-status-current-style 'bg=#00afff fg=#000000 bold'

# Status bar colors
set -g status-style 'bg=#080808 fg=#8a8a8a'

# -- windows & panes -----------------------------------------------------------
# New window starts in home dir; new pane retains current path
bind c new-window
bind C-c new-window
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# -- keybindings ---------------------------------------------------------------
# Remove vim pane navigation key so Ctrl-k works in shell (erase to end of line)
unbind 'C-k'

# Choose session / window
unbind S
bind S choose-session
bind tab choose-window

# Navigate panes with Ctrl+Arrow (no prefix)
# Note: Ctrl+Left/Right won't reach the shell (use Alt+Left/Right for word jump)
bind-key -n C-Up    select-pane -U
bind-key -n C-Down  select-pane -D
bind-key -n C-Left  select-pane -L
bind-key -n C-Right select-pane -R

# Cycle windows with Cmd-Shift-[ and Cmd-Shift-] (no prefix), like IDE tab switching.
# iTerm2 maps these to Ctrl+Shift+Left/Right (\e[1;6D and \e[1;6C) since
# Cmd+Shift+[/] are consumed by iTerm2 itself and never reach tmux otherwise.
unbind -n C-S-Left
bind-key -n C-S-Left select-window -t :-
unbind -n C-S-Right
bind-key -n C-S-Right select-window -t :+

# Synchronise panes toggle (no prefix)
bind -n C-s setw synchronize-panes

# Zoom current pane
bind \; resize-pane -Z

# Kill session with confirmation
unbind q
bind q confirm kill-session

# -- keyboard ------------------------------------------------------------------
# Pass extended key sequences (e.g. Shift+Enter = \e[13;2u) through to inner
# applications. Required for apps like Claude CLI that distinguish Shift+Enter
# from plain Enter to insert a newline without submitting.
# "always" forwards unconditionally; "on" only forwards if the inner app
# explicitly requests extended keys via XTMODKEYS — Claude CLI doesn't.
set -g extended-keys always
# Advertise extended-key support to applications running inside tmux, so they
# know they can rely on receiving these sequences.
set -as terminal-features 'xterm*:extkeys'
# Also match tmux-256color (what $TERM is set to inside tmux sessions)
set -as terminal-features 'tmux*:extkeys'

# -- plugins -------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-urlview'
set -g @plugin 'laktak/extrakto'

# Continuum: auto-restore last saved session
set -g @continuum-restore 'on'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
