[Service]
# Run as root so caddy can read /root/.config/caddy/Caddyfile and /root/users.json.
# The upstream unit runs as the caddy user, which has no access to /root/.
User=root
Group=root
# Secrets (JWT_SHARED_KEY) live here — plain key=value, no `export`, required by systemd.
# Managed by the private repo's chezmoi layer.
EnvironmentFile=/root/.config/caddy/caddy.env
# Empty ExecStart= clears the inherited value from the upstream unit — required for
# list-type directives in systemd drop-ins before setting a new value.
# Caddyfile is managed by the private repo's chezmoi layer.
# Using ~/.config instead of /etc/caddy so chezmoi (which only manages ~) can own the file.
ExecStart=
ExecStart=/usr/bin/caddy run --environ --config /root/.config/caddy/Caddyfile
