- name: Assemble SSH config from fragments
  assemble:
    src: "{{ role_path }}/files/ssh_config_fragments"
    dest: ~/.ssh/config
    mode: "0600"

- name: "Use keychain on macOS"
  lineinfile:
    path: ~/.ssh/config
    state: present
    regexp: UseKeychain
    line: "  UseKeychain yes"
    insertafter: "PreferredAuthentications"
  when: ansible_os_family == "Darwin"
